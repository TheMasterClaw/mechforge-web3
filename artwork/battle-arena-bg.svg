<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#12122a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.3" />
    </linearGradient>
    
    <radialGradient id="arenaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(99,102,241,0.2)" />
      <stop offset="100%" style="stop-color:transparent" />
    </radialGradient>
    
    <pattern id="gridPattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Arena Floor -->
  <polygon points="0,700 960,500 1920,700 1920,1080 0,1080" fill="url(#floorGrad)"/>
  
  <!-- Grid Pattern on Floor -->
  <polygon points="200,720 960,520 1720,720 1600,1000 320,1000" fill="url(#gridPattern)" opacity="0.5"/>
  
  <!-- Arena Circle -->
  <ellipse cx="960" cy="700" rx="400" ry="100" fill="url(#arenaGlow)" stroke="#6366f1" stroke-width="3"/>
  
  <ellipse cx="960" cy="700" rx="300" ry="75" fill="none" stroke="rgba(168,85,247,0.5)" stroke-width="2"/>
  
  <ellipse cx="960" cy="700" rx="200" ry="50" fill="none" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  
  <!-- Battle Lines -->
  <line x1="960" y1="600" x2="960" y2="800" stroke="#ef4444" stroke-width="2" stroke-dasharray="10,10" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- Side Platforms -->
  <g transform="translate(200, 400)">
    <polygon points="0,100 150,50 300,100 300,200 0,200" fill="#1a1a3e" stroke="#6366f1" stroke-width="2"/>
    <rect x="20" y="80" width="260" height="5" fill="#6366f1" opacity="0.5"/>
    
    <!-- Left Mech Silhouette -->
    <g transform="translate(150, 20) scale(0.6)">
      <polygon points="0,-60 -40,20 0,60 40,20" fill="#6366f1" opacity="0.3"/>
      <rect x="-30" y="-40" width="60" height="80" rx="10" fill="none" stroke="#6366f1" stroke-width="2"/>
    </g>
    
    <text x="150" y="170" fill="#fff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">PLAYER 1</text>
  </g>
  
  <g transform="translate(1420, 400)">
    <polygon points="0,100 150,50 300,100 300,200 0,200" fill="#1a1a3e" stroke="#a855f7" stroke-width="2"/>
    <rect x="20" y="80" width="260" height="5" fill="#a855f7" opacity="0.5"/>
    
    <!-- Right Mech Silhouette -->
    <g transform="translate(150, 20) scale(0.6)">
      <polygon points="0,-60 -40,20 0,60 40,20" fill="#a855f7" opacity="0.3"/>
      <rect x="-30" y="-40" width="60" height="80" rx="10" fill="none" stroke="#a855f7" stroke-width="2"/>
    </g>
    
    <text x="150" y="170" fill="#fff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">PLAYER 2</text>
  </g>
  
  <!-- VS Text -->
  <g transform="translate(960, 300)">
    <text x="0" y="0" fill="#ef4444" font-family="Arial" font-size="120" font-weight="900" text-anchor="middle" 
          style="text-shadow: 0 0 40px #ef4444">VS</text>
  </g>
  
  <!-- Floating Particles -->
  <g fill="#fff" opacity="0.5">
    <circle cx="200" cy="200" r="2">
      <animate attributeName="cy" values="200;150;200" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="1700" cy="300" r="3">
      <animate attributeName="cy" values="300;250;300" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="960" cy="150" r="2">
      <animate attributeName="cy" values="150;100;150" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="6s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="400" cy="500" r="2">
      <animate attributeName="cy" values="500;450;500" dur="7s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="1500" cy="600" r="2">
      <animate attributeName="cy" values="600;550;600" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Side Decorations -->
  <g transform="translate(100, 100)">
    <rect width="4" height="200" fill="#6366f1" opacity="0.5"/>
    <rect y="50" width="4" height="100" fill="#a855f7"/>
  </g>
  
  <g transform="translate(1816, 100)">
    <rect width="4" height="200" fill="#6366f1" opacity="0.5"/>
    <rect y="50" width="4" height="100" fill="#a855f7"/>
  </g>
  
  <!-- Title -->
  <g transform="translate(960, 80)">
    <text x="0" y="0" fill="#fff" font-family="Arial" font-size="48" font-weight="bold" text-anchor="middle"
          style="text-shadow: 0 0 20px rgba(99,102,241,0.5)">BATTLE ARENA</text>
    
    <text x="0" y="30" fill="#a855f7" font-family="Arial" font-size="16" text-anchor="middle">PvP MECH COMBAT</text>
  </g>
</svg>