<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradTank" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowTank" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(34,197,94,0.3)" />
      <stop offset="100%" style="stop-color:transparent" />
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="#0a0a1a"/>
  <circle cx="256" cy="256" r="200" fill="url(#glowTank)"/>
  
  <g transform="translate(256, 256)">
    <!-- Heavy Body -->
    <rect x="-70" y="-60" width="140" height="140" rx="20" fill="url(#gradTank)" stroke="#fff" stroke-width="3"/>
    <!-- Armor Plates -->
    <rect x="-50" y="-40" width="100" height="30" rx="5" fill="#0a0a1a" stroke="#22c55e" stroke-width="2"/>
    <rect x="-50" y="0" width="100" height="30" rx="5" fill="#0a0a1a" stroke="#22c55e" stroke-width="2"/>
    <rect x="-50" y="40" width="100" height="30" rx="5" fill="#0a0a1a" stroke="#22c55e" stroke-width="2"/>
    
    <!-- Massive Shield (Left) -->
    <rect x="-120" y="-80" width="40" height="160" rx="10" fill="#1a1a3e" stroke="#22c55e" stroke-width="3"/>
    <polygon points="-120,-60 -120,60 -140,40 -140,-40" fill="#22c55e" opacity="0.5"/>
    
    <!-- Heavy Weapon (Right) -->
    <rect x="80" y="-40" width="60" height="40" fill="#1a1a3e" stroke="#22c55e" stroke-width="2"/>
    <rect x="100" y="-100" width="30" height="80" fill="#22c55e"/>
    <circle cx="115" cy="-110" r="18" fill="#16a34a"/>
    
    <!-- Dome Head -->
    <circle cx="0" cy="-90" r="35" fill="#1a1a3e" stroke="#22c55e" stroke-width="3"/>
    <!-- Visor -->
    <rect x="-20" y="-95" width="40" height="10" rx="5" fill="#22c55e"/>
    
    <!-- Heavy Legs -->
    <rect x="-60" y="80" width="45" height="100" rx="8" fill="#1a1a3e" stroke="#22c55e" stroke-width="3"/>
    <rect x="15" y="80" width="45" height="100" rx="8" fill="#1a1a3e" stroke="#22c55e" stroke-width="3"/>
    
    <!-- Tank Treads -->
    <rect x="-65" y="170" width="55" height="25" rx="5" fill="#374151"/>
    <rect x="10" y="170" width="55" height="25" rx="5" fill="#374151"/>
  </g>
  
  <g transform="translate(20, 420)">
    <rect width="120" height="70" rx="8" fill="rgba(0,0,0,0.6)" stroke="#22c55e" stroke-width="1"/>
    <text x="10" y="20" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">Tank Type</text>
    <text x="10" y="40" fill="#ef4444" font-family="Arial" font-size="10">⚔️ ATK: 89</text>
    <text x="10" y="55" fill="#22c55e" font-family="Arial" font-size="10">🛡️ DEF: 156</text>
  </g>
  
  <g transform="translate(432, 20)">
    <rect width="50" height="24" rx="12" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1"/>
    <text x="25" y="16" fill="#3b82f6" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">RARE</text>
  </g>
</svg>