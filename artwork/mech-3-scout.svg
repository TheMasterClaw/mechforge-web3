<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradScout" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowScout" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(245,158,11,0.3)" />
      <stop offset="100%" style="stop-color:transparent" />
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="#0a0a1a"/>
  <circle cx="256" cy="256" r="200" fill="url(#glowScout)"/>
  
  <g transform="translate(256, 256)">
    <!-- Sleek Body -->
    <ellipse cx="0" cy="20" rx="50" ry="70" fill="url(#gradScout)" stroke="#fff" stroke-width="2"/>
    
    <!-- Streamlined Design -->
    <polygon points="0,-50 -30,0 0,80 30,0" fill="#0a0a1a" stroke="#f59e0b" stroke-width="2"/>
    
    <!-- Speed Lines -->
    <polygon points="-80,-20 -120,-10 -80,0" fill="#f59e0b" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="0.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="80,-20 120,-10 80,0" fill="#f59e0b" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="0.5s" repeatCount="indefinite"/>
    </polygon>
    
    <!-- Wings -->
    <polygon points="-40,-10 -100,-40 -90,20 -30,10" fill="#1a1a3e" stroke="#f59e0b" stroke-width="2"/>
    <polygon points="40,-10 100,-40 90,20 30,10" fill="#1a1a3e" stroke="#f59e0b" stroke-width="2"/>
    
    <!-- Twin Blades (Arms) -->
    <rect x="-110" y="-30" width="15" height="80" rx="3" fill="#f59e0b" transform="rotate(-15 -102 10)"/>
    <rect x="95" y="-30" width="15" height="80" rx="3" fill="#f59e0b" transform="rotate(15 102 10)"/>
    
    <!-- Aero Head -->
    <ellipse cx="0" cy="-60" rx="25" ry="20" fill="#1a1a3e" stroke="#f59e0b" stroke-width="2"/>
    <!-- Single Cyclops Eye -->
    <circle cx="0" cy="-60" r="12" fill="#f59e0b">
      <animate attributeName="fill" values="#f59e0b;#fef3c7;#f59e0b" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Hover Legs -->
    <rect x="-40" y="70" width="20" height="50" rx="10" fill="#1a1a3e" stroke="#f59e0b" stroke-width="2"/>
    <rect x="20" y="70" width="20" height="50" rx="10" fill="#1a1a3e" stroke="#f59e0b" stroke-width="2"/>
    
    <!-- Hover Jets -->
    <circle cx="-30" cy="130" r="15" fill="#3b82f6" opacity="0.7">
      <animate attributeName="r" values="15;20;15" dur="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="130" r="15" fill="#3b82f6" opacity="0.7">
      <animate attributeName="r" values="15;20;15" dur="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <g transform="translate(20, 420)">
    <rect width="120" height="70" rx="8" fill="rgba(0,0,0,0.6)" stroke="#f59e0b" stroke-width="1"/>
    <text x="10" y="20" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">Scout Type</text>
    <text x="10" y="40" fill="#a855f7" font-family="Arial" font-size="10">⚡ SPD: 156</text>
    <text x="10" y="55" fill="#22c55e" font-family="Arial" font-size="10">🍃 AGI: High</text>
  </g>
  
  	g transform="translate(432, 20)">
    <rect width="45" height="24" rx="12" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="1"/>
    <text x="22" y="16" fill="#a855f7" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">EPIC</text>
  </g>
</svg>