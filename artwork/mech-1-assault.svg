<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(99,102,241,0.3)" />
      <stop offset="100%" style="stop-color:transparent" />
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="#0a0a1a"/>
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  
  <!-- Mech Body -->
  <g transform="translate(256, 256)">
    <!-- Core -->
    <polygon points="0,-80 -60,40 0,100 60,40" fill="url(#grad1)" stroke="#fff" stroke-width="3"/>
    <!-- Inner Core -->
    <polygon points="0,-50 -35,25 0,60 35,25" fill="#0a0a1a" stroke="#6366f1" stroke-width="2"/>
    
    <!-- Left Arm -->
    <rect x="-90" y="-20" width="40" height="80" rx="10" fill="#1a1a3e" stroke="#6366f1" stroke-width="2"/>
    <circle cx="-70" cy="60" r="15" fill="url(#grad1)"/>
    
    <!-- Right Arm (with weapon) -->
    <rect x="50" y="-20" width="40" height="80" rx="10" fill="#1a1a3e" stroke="#6366f1" stroke-width="2"/>
    <rect x="70" y="-60" width="20" height="100" fill="#6366f1"/>
    <circle cx="80" cy="-70" r="12" fill="#a855f7"/>
    
    <!-- Head -->
    <rect x="-25" y="-120" width="50" height="50" rx="8" fill="#1a1a3e" stroke="#6366f1" stroke-width="2"/>
    <!-- Eyes -->
    <rect x="-15" y="-105" width="12" height="8" rx="2" fill="#22c55e"/>
    <rect x="3" y="-105" width="12" height="8" rx="2" fill="#22c55e"/>
    
    <!-- Shoulders -->
    <circle cx="-70" cy="-30" r="25" fill="#1a1a3e" stroke="#6366f1" stroke-width="2"/>
    <circle cx="70" cy="-30" r="25" fill="#1a1a3e" stroke="#6366f1" stroke-width="2"/>
    
    <!-- Legs -->
    <rect x="-50" y="80" width="30" height="80" rx="5" fill="#1a1a3e" stroke="#6366f1" stroke-width="2"/>
    <rect x="20" y="80" width="30" height="80" rx="5" fill="#1a1a3e" stroke="#6366f1" stroke-width="2"/>
    
    <!-- Boosters -->
    <circle cx="-35" cy="150" r="12" fill="#ef4444" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="150" r="12" fill="#ef4444" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Stats Overlay -->
  <g transform="translate(20, 420)">
    <rect width="120" height="70" rx="8" fill="rgba(0,0,0,0.6)" stroke="#6366f1" stroke-width="1"/>
    <text x="10" y="20" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">Assault Type</text>
    <text x="10" y="40" fill="#22c55e" font-family="Arial" font-size="10">⚔️ ATK: 145</text>
    <text x="10" y="55" fill="#3b82f6" font-family="Arial" font-size="10">🛡️ DEF: 98</text>
  </g>
  
  <!-- Rarity Badge -->
  <g transform="translate(432, 20)">
    <rect width="60" height="24" rx="12" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1"/>
    <text x="30" y="16" fill="#f59e0b" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">LEGENDARY</text>
  </g>
</svg>