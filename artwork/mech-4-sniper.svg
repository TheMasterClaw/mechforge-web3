<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradSniper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowSniper" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(236,72,153,0.3)" />
      <stop offset="100%" style="stop-color:transparent" />
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="#0a0a1a"/>
  <circle cx="256" cy="256" r="200" fill="url(#glowSniper)"/>
  
  <g transform="translate(256, 256)">
    <!-- Tall Body -->
    <rect x="-35" y="-40" width="70" height="130" rx="10" fill="url(#gradSniper)" stroke="#fff" stroke-width="2"/>
    
    <!-- Cloak Panels -->
    <polygon points="-35,-20 -70,80 -35,60" fill="#1a1a3e" stroke="#ec4899" stroke-width="1"/>
    <polygon points="35,-20 70,80 35,60" fill="#1a1a3e" stroke="#ec4899" stroke-width="1"/>
    
    <!-- Precision Rifle -->
    <rect x="40" y="-80" width="20" height="120" rx="2" fill="#1a1a3e" stroke="#ec4899" stroke-width="2"/>
    <rect x="38" y="-100" width="24" height="30" fill="#ec4899"/>
    <rect x="45" y="-140" width="10" height="50" fill="#be185d"/>
    
    <!-- Scope -->
    <circle cx="50" cy="-150" r="15" fill="#0a0a1a" stroke="#ec4899" stroke-width="3"/>
    <circle cx="50" cy="-150" r="8" fill="#ef4444">
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Left Arm (Stabilizer) -->
    <rect x="-70" y="0" width="35" height="15" rx="3" fill="#1a1a3e" stroke="#ec4899" stroke-width="1"/>
    
    <!-- Hood Head -->
    <polygon points="0,-110 -30,-60 0,-40 30,-60" fill="#1a1a3e" stroke="#ec4899" stroke-width="2"/>
    
    <!-- Targeting Eye -->
    <circle cx="0" cy="-65" r="10" fill="#ec4899">
      <animate attributeName="fill" values="#ec4899;#f9a8d4;#ec4899" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Long Legs -->
    <rect x="-30" y="90" width="22" height="80" rx="5" fill="#1a1a3e" stroke="#ec4899" stroke-width="2"/>
    <rect x="8" y="90" width="22" height="80" rx="5" fill="#1a1a3e" stroke="#ec4899" stroke-width="2"/>
    
    <!-- Stabilizers -->
    <rect x="-50" y="160" width="40" height="12" rx="3" fill="#374151"/>
    <rect x="10" y="160" width="40" height="12" rx="3" fill="#374151"/>
  </g>
  
  <g transform="translate(20, 420)">
    <rect width="120" height="70" rx="8" fill="rgba(0,0,0,0.6)" stroke="#ec4899" stroke-width="1"/>
    <text x="10" y="20" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">Sniper Type</text>
    <text x="10" y="40" fill="#ef4444" font-family="Arial" font-size="10">🎯 RNG: 200</text>
    <text x="10" y="55" fill="#ec4899" font-family="Arial" font-size="10">🔍 ACC: 98%</text>
  </g>
  
  <g transform="translate(432, 20)">
    <rect width="80" height="24" rx="12" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1"/>
    <text x="40" y="16" fill="#22c55e" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">UNCOMMON</text>
  </g>
</svg>